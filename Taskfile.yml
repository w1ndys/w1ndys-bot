# 📌 影响范围：调用 Go、Node、Docker 工具链并读写本地构建缓存与 WebUI 产物。
version: "3"

dotenv:
  - .env

env:
  GOCACHE: "{{.ROOT_DIR}}/.cache/go-build"
  GOMODCACHE: "{{.ROOT_DIR}}/.cache/go-mod"

tasks:
  setup:
    desc: 安装或同步 Go 与 WebUI 开发依赖
    cmds:
      - go mod download
      - npm --prefix web install

  test:
    desc: 运行完整测试套件
    cmds:
      - go test ./...

  lint:
    desc: 执行格式与静态检查
    cmds:
      - test -z "$(gofmt -l cmd internal pkg plugins)"
      - go vet ./...
      - npm --prefix web run typecheck

  run:
    desc: 构建 WebUI 并启动本地机器人基础框架
    deps: [web-build]
    cmds:
      - go run ./cmd/bot

  web-dev:
    desc: 启动 WebUI 开发服务器并代理本机 Go API
    cmds:
      - npm --prefix web run dev

  web-build:
    desc: 类型检查并构建 WebUI 生产资源
    cmds:
      - npm --prefix web run build

  web-e2e-install:
    desc: 安装 WSL/CI 无头测试所需的 Chromium 与系统依赖
    cmds:
      - npm --prefix web exec -- playwright install --with-deps chromium

  web-e2e:
    desc: 使用无头 Chromium 运行 WebUI 端到端测试
    cmds:
      - npm --prefix web run test:e2e

  web-e2e-ui:
    desc: 使用 Playwright UI 调试 WebUI 端到端测试
    cmds:
      - npm --prefix web run test:e2e:ui

  migrate-up:
    desc: 应用所有未执行的数据库迁移
    cmds:
      - env -u DB_PASSWORD -u NAPCAT_TOKEN -u JWT_SECRET docker compose run --rm --no-deps --entrypoint /app/migrate bot up

  migrate-down:
    desc: 回滚最近一条数据库迁移
    cmds:
      - env -u DB_PASSWORD -u NAPCAT_TOKEN -u JWT_SECRET docker compose run --rm --no-deps --entrypoint /app/migrate bot down 1

  migrate-version:
    desc: 查看当前数据库迁移版本
    cmds:
      - env -u DB_PASSWORD -u NAPCAT_TOKEN -u JWT_SECRET docker compose run --rm --no-deps --entrypoint /app/migrate bot version

  compose-up:
    desc: 构建并后台启动机器人和 PostgreSQL
    cmds:
      - env -u DB_PASSWORD -u NAPCAT_TOKEN -u JWT_SECRET docker compose up --build -d

  compose-rebuild:
    desc: 重新构建镜像并强制创建机器人和 PostgreSQL 容器
    cmds:
      - env -u DB_PASSWORD -u NAPCAT_TOKEN -u JWT_SECRET docker compose up --build --force-recreate -d

  compose-restart:
    desc: 重新读取 .env 并强制创建容器，不重新构建镜像
    cmds:
      - env -u DB_PASSWORD -u NAPCAT_TOKEN -u JWT_SECRET docker compose up --force-recreate -d

  compose-down:
    desc: 停止并移除机器人和 PostgreSQL 容器
    cmds:
      - docker compose down

  compose-logs:
    desc: 持续查看机器人和 PostgreSQL 日志
    cmds:
      - docker compose logs -f
